services:
  app:
    build: .
    ports:
      - "5173:5173"
    volumes:
      # Bind-mount source code so edits are live-reloaded
      - .:/app

      # CRITICAL: use a named volume for node_modules inside the container
      # so the container's node_modules (from `npm ci`) aren't overwritten
      # by the bind mount
      - node_modules:/app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true   # reliable file watching in Docker

volumes:
  node_modules: